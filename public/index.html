<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f6feb" />
  <title>AI English Mentor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">🤖 AI English Mentor</h1>
  </header>

  <main class="app-main">
    <!-- Home / profile selection (spec §7.1) -->
    <section id="screen-home" class="screen" data-testid="screen-home">
      <div class="screen-head">
        <h2>Who's practicing?</h2>
        <button type="button" class="btn btn-primary" data-testid="new-profile">+ New profile</button>
      </div>
      <ul class="profile-list" data-testid="profile-list"></ul>
      <p class="empty-hint" data-testid="empty-hint" hidden>No profiles yet — create one to start.</p>
      <details class="settings">
        <summary>Settings</summary>
        <label class="field">
          <span class="field-label">Access PIN</span>
          <input type="password" data-testid="pin-input" autocomplete="off" placeholder="shared PIN for the AI" />
        </label>
      </details>
    </section>

    <!-- Profile editor (spec §7.2) -->
    <section id="screen-editor" class="screen" data-testid="screen-editor" hidden>
      <div class="screen-head">
        <h2 data-testid="editor-title">New profile</h2>
      </div>
      <form id="profile-form" class="profile-form" novalidate>
        <label class="field">
          <span class="field-label">Name</span>
          <input type="text" data-testid="profile-name" name="name" autocomplete="off" />
          <span class="error" data-testid="error-name" hidden></span>
        </label>
        <label class="field">
          <span class="field-label">English level</span>
          <select data-testid="profile-level" name="level"></select>
          <span class="error" data-testid="error-level" hidden></span>
        </label>
        <label class="field">
          <span class="field-label">Interests / profession</span>
          <textarea data-testid="profile-interests" name="interests" rows="3"
            placeholder="e.g. water treatment, Turkish &amp; Korean dramas, family, Vinted"></textarea>
        </label>
        <div class="form-actions">
          <button type="button" class="btn" data-testid="editor-back">Back</button>
          <button type="button" class="btn btn-danger" data-testid="delete-profile" hidden>Delete</button>
          <button type="submit" class="btn btn-primary" data-testid="save-profile">Save</button>
        </div>
      </form>
    </section>

    <!-- Conversation (text-only shell — #2; voice in #5, avatar in #6) -->
    <section id="screen-conversation" class="screen" data-testid="conversation-screen" hidden>
      <div class="conversation-head">
        <button type="button" class="btn btn-small" data-testid="conversation-back">← Home</button>
        <button type="button" class="btn btn-small" data-testid="end-session">End session</button>
      </div>
      <p class="conversation-greeting" data-testid="conversation-greeting"></p>
      <div class="avatar" data-testid="avatar" aria-hidden="true">🤖</div>
      <ul class="transcript" data-testid="transcript"></ul>
      <p class="error chat-error" data-testid="chat-error" hidden></p>
      <form class="composer" id="composer">
        <input type="text" data-testid="message-input" name="message" autocomplete="off"
          placeholder="Type a message…" aria-label="Message" />
        <button type="submit" class="btn btn-primary" data-testid="send-message">Send</button>
      </form>
    </section>

    <!-- Session summary (placeholder — real summary in #7) -->
    <section id="screen-summary" class="screen" data-testid="summary-screen" hidden>
      <h2>Session summary</h2>
      <p class="muted" data-testid="summary-body">Session ended. A coaching summary appears here once the AI is connected (#7).</p>
      <button type="button" class="btn btn-primary" data-testid="summary-home">Back to home</button>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
